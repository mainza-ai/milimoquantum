services:
  neo4j:
    image: neo4j:latest
    container_name: mq-neo4j
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    environment:
      - NEO4J_AUTH=neo4j/milimo-quantum-graph
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped

  falkordb:
    image: falkordb/falkordb:latest
    container_name: mq-falkordb
    ports:
      - "6379:6379"
    volumes:
      - falkordb_data:/data
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  falkordb_data:
