version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - milimo-data:/data/.milimoquantum
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-milimo-quantum-graph}
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile
      target: frontend-build
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/frontend/src
    environment:
      - VITE_API_URL=http://localhost:8000
    profiles:
      - dev

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
    environment:
      - NEO4J_AUTH=neo4j/milimo-quantum-graph
      - NEO4J_PLUGINS=["apoc"]
    healthcheck:
      test: ["CMD-SHELL", "neo4j status | grep -q 'running'"]
      interval: 10s
      timeout: 5s
      retries: 10
    profiles:
      - graph

volumes:
  milimo-data:
  neo4j-data:
