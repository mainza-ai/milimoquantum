[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_functions = test_*
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests that require external services
    e2e: end-to-end tests that require running services
    quantum: tests for quantum execution
    agents: tests for agent system
    celery: tests for Celery workers
    websocket: tests for WebSocket connections
    neo4j: tests for Neo4j graph database
    nemoclaw: tests for NemoClaw sandbox
    playwright: browser E2E tests
